spring:
  application:
    name: nocodeapp
  datasource:
    url: jdbc:mysql://localhost:3306/ai_no_code_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: local
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ai.nocodeapp.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn