spring:
  application:
    name: nocodeapp
  datasource:
    url: jdbc:mysql://localhost:3306/ai_no_code_app?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: local
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600
      database: 0
  # session 配置
  session:
    timeout: 2592000
    store-type: redis
server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
# springdoc-openapi项目配置
springdoc:
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.ai.nocodeapp.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
